<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sum Slider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #333; overflow: hidden; padding-top: 40px; }
        .board-wrapper { display: grid; grid-template-columns: 40px auto; grid-template-rows: 40px auto; gap: 0; position: relative; }
        .col-targets { grid-column: 2; display: flex; justify-content: space-around; align-items: center; font-weight: 600; font-size: 18px; color: #94a3b8; }
        .row-targets { grid-row: 2; display: flex; flex-direction: column; justify-content: space-around; align-items: center; font-weight: 600; font-size: 18px; color: #94a3b8; width: 40px; }
        #canvas-wrapper { grid-column: 2; grid-row: 2; position: relative; background: white; border-radius: 2px; border: 1.5px solid #e2e2e2; }
        canvas { background: white; cursor: grab; display: block; }
        canvas:active { cursor: grabbing; }
        .target { transition: color 0.3s ease; }
        .target.solved { color: #22c55e; }
        #instructions-overlay { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.98); }
    </style>
</head>
<body class="bg-white text-gray-800">

<div class="flex flex-col items-center max-w-[450px] mx-auto relative">
    <div id="help-toggle"
         class="absolute right-5 top-0 w-7 h-7 rounded-full border-[1.5px] border-gray-300 flex items-center justify-center cursor-pointer text-gray-400 font-bold hover:border-gray-800 hover:text-gray-800 transition-all"
         onclick="toggleHelp(true)">?</div>

    <h1 class="text-2xl font-light tracking-[0.25em] uppercase text-gray-700 mb-4 text-center">Sum Slider</h1>

    <div class="flex items-center justify-between w-full max-w-[200px] mb-8 py-2 border-y border-gray-100">
        <div id="prevBtn" class="cursor-pointer text-gray-400 text-2xl px-2 hover:text-gray-900 hover:scale-110 transition-all select-none">←</div>
        <div class="text-center">
            <span class="text-[9px] uppercase tracking-[0.2em] text-gray-400 font-bold mb-0.5 block leading-none">Puzzle</span>
            <span id="lvlNum" class="text-lg font-light text-gray-700 leading-none">1</span>
            <span id="minMovesLabel" class="text-[10px] uppercase tracking-[0.14em] text-gray-400 font-bold mt-1 block leading-none"></span>
        </div>
        <div id="nextBtn" class="cursor-pointer text-gray-400 text-2xl px-2 hover:text-gray-900 hover:scale-110 transition-all select-none">→</div>
    </div>

    <div class="board-wrapper">
        <div id="colTargets" class="col-targets"></div>
        <div id="rowTargets" class="row-targets"></div>
        <div id="canvas-wrapper" class="shadow-xl">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div class="flex flex-col gap-4 w-full px-4 mt-10 mb-10">
        <div class="flex gap-4">
            <button id="undoBtn"
                    class="flex-1 border border-gray-300 py-3 rounded-sm text-xs font-semibold text-gray-500 hover:bg-gray-50 uppercase tracking-widest transition-all disabled:opacity-30 disabled:cursor-not-allowed"
                    disabled>Undo</button>
            <button id="resetBtn"
                    class="flex-1 border border-gray-300 py-3 rounded-sm text-xs font-semibold text-gray-500 hover:bg-gray-50 uppercase tracking-widest transition-all">Reset</button>
            <button id="solverBtn"
                    class="flex-1 border border-gray-300 py-3 rounded-sm text-xs font-semibold text-gray-500 hover:bg-gray-50 uppercase tracking-widest transition-all">Solve</button>
        </div>
        <button id="solveNextBtn"
                class="hidden w-full bg-gray-900 text-white py-3 rounded-sm text-xs font-semibold hover:bg-black uppercase tracking-widest transition-all shadow-lg">
            Next Puzzle
        </button>
    </div>
</div>

<div id="instructions-overlay" class="fixed inset-0 hidden flex-col items-center z-[100] p-10 overflow-y-auto">
    <div class="max-w-[400px] text-left relative">
        <div class="absolute -top-5 -right-5 text-2xl font-light text-gray-400 cursor-pointer p-2 hover:text-gray-800" onclick="toggleHelp(false)">✕</div>
        <h2 class="text-2xl font-light tracking-widest uppercase text-center mb-8 text-gray-800">How to Play</h2>
        <p class="text-sm leading-relaxed text-gray-600 mb-8">
            Match the target sum for every row and column by sliding tiles on the grid. Long rectangles can only slide along their long axis. Squares can slide both ways. Grid targets turn <span class="text-green-500 font-bold">Green</span> when their sum is met.
        </p>
        <button onclick="toggleHelp(false)"
                class="w-full bg-gray-900 text-white py-4 rounded-sm text-xs font-semibold hover:bg-black uppercase tracking-widest transition-all shadow-lg">
            PLAY
        </button>
    </div>
</div>

    // Movement depends only on dimensions:
    // w > h -> horizontal only, h > w -> vertical only, w === h -> both
    function allowedAxes(t) {
        if (t.w > t.h) return { h: true, v: false };
        if (t.h > t.w) return { h: false, v: true };
        return { h: true, v: true };
    }

    // Color depends only on (w, h)
    function tileColor(w, h) {
        if (w === 2 && h === 2) return '#1e3a8a'; // navy
        if (w === 3 && h === 1) return '#16a34a'; // green
        if (w === 1 && h === 3) return '#dc2626'; // red
        if (w === 2 && h === 1) return '#f59e0b'; // orange
        if (w === 1 && h === 2) return '#8b5cf6'; // purple
        if (w === 1 && h === 1) return '#3b82f6'; // blue
        return '#64748b'; // future rectangles
    }

    // Parse tile from compact [r,c,w,h,...vals]
    function parseTile(raw, id) {
        const r = raw[0], c = raw[1], w = raw[2], h = raw[3];
        const need = w * h;

        let vals = raw.slice(4).map(v => (v === null || v === undefined) ? 0 : v);
        if (vals.length < need) vals = vals.concat(new Array(need - vals.length).fill(0));
        vals = vals.slice(0, need);

        return {
            id,
            r, c, w, h,
            vals,
            x: c * GRID_SIZE + (w * GRID_SIZE) / 2,
            y: r * GRID_SIZE + (h * GRID_SIZE) / 2
        };
    }

    function computeSums() {
        const curR = new Array(p.size).fill(0);
        const curC = new Array(p.size).fill(0);

        for (const t of p.tiles) {
            for (let rr = 0; rr < t.h; rr++) {
                for (let cc = 0; cc < t.w; cc++) {
                    const idx = rr * t.w + cc;
                    const v = t.vals[idx];
                    if (!v) continue;
                    curR[t.r + rr] += v;
                    curC[t.c + cc] += v;
                }
            }
        }
        return { curR, curC };
    }

    function runSanityTests() {
        // Axes sanity
        const a = allowedAxes({ w: 3, h: 1 });
        const b = allowedAxes({ w: 1, h: 3 });
        const c = allowedAxes({ w: 2, h: 2 });
        console.assert(a.h && !a.v, 'Sanity: 3x1 horizontal-only');
        console.assert(!b.h && b.v, 'Sanity: 1x3 vertical-only');
        console.assert(c.h && c.v, 'Sanity: 2x2 free');

        // parseTile sanity (pads missing vals with 0)
        const pt = parseTile([0, 0, 2, 2, 1], 99);
        console.assert(pt.vals.length === 4 && pt.vals[0] === 1 && pt.vals[3] === 0, 'Sanity: parseTile pads to w*h');

        // color sanity
        console.assert(tileColor(1,1) === '#3b82f6', 'Sanity: color 1x1');
        console.assert(tileColor(2,2) === '#1e3a8a', 'Sanity: color 2x2');

        // PUZZLES structure sanity
        console.assert(Array.isArray(PUZZLES) && PUZZLES.length > 0, 'Sanity: PUZZLES array');
        console.assert(PUZZLES.every(pz => pz && typeof pz.s === 'number' && pz.t && Array.isArray(pz.b)), 'Sanity: puzzle schema');
    }

    function loadPuzzle(index) {
        const data = PUZZLES[index];
        const inflatedTiles = data.b.map((raw, i) => parseTile(raw, i + 1));

        p = { size: data.s, targets: data.t, tiles: inflatedTiles };
        originalScramble = JSON.parse(JSON.stringify(inflatedTiles));

        document.getElementById('lvlNum').innerText = index + 1;

        moveHistory = [];
        isSolved = false;
        isAutoSolving = false;
        solveAnim = null;

        updateUIState();

        canvas.width = p.size * GRID_SIZE;
        canvas.height = p.size * GRID_SIZE;

        setupHTMLTargets();
        runSanityTests();

        setMinMovesLabel(index);
    }

    function setupHTMLTargets() {
        const rowCont = document.getElementById('rowTargets');
        const colCont = document.getElementById('colTargets');
        rowCont.innerHTML = '';
        colCont.innerHTML = '';
        rowCont.style.height = `${canvas.height}px`;
        colCont.style.width = `${canvas.width}px`;

        p.targets.rows.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'target';
            div.id = `row-t-${i}`;
            div.innerText = val;
            rowCont.appendChild(div);
        });
        p.targets.cols.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'target';
            div.id = `col-t-${i}`;
            div.innerText = val;
            colCont.appendChild(div);
        });
    }

    function updateUIState() {
        document.getElementById('undoBtn').disabled = moveHistory.length === 0 || isSolved || isAutoSolving;
        document.getElementById('prevBtn').classList.toggle('opacity-10', currentLvlIdx === 0);
        document.getElementById('prevBtn').style.pointerEvents = currentLvlIdx === 0 ? 'none' : 'auto';
        document.getElementById('nextBtn').classList.toggle('opacity-10', currentLvlIdx === PUZZLES.length - 1);
        document.getElementById('nextBtn').style.pointerEvents = currentLvlIdx === PUZZLES.length - 1 ? 'none' : 'auto';

        const nextBtn = document.getElementById('solveNextBtn');
        if (isSolved && currentLvlIdx < PUZZLES.length - 1) nextBtn.classList.remove('hidden');
        else nextBtn.classList.add('hidden');
    }

    function saveState() {
        const state = p.tiles.map(t => ({ id: t.id, r: t.r, c: t.c }));
        moveHistory.push(JSON.stringify(state));
        updateUIState();
    }

    function getBounds(t, pxX, pxY) {
        return {
            l: pxX - (t.w * GRID_SIZE) / 2,
            r: pxX + (t.w * GRID_SIZE) / 2,
            t: pxY - (t.h * GRID_SIZE) / 2,
            b: pxY + (t.h * GRID_SIZE) / 2
        };
    }

    function overlap(r1, r2) {
        // Anti-snag: require real penetration before treating as overlap.
        const EPS = 0.75;
        const horiz = Math.min(r1.r, r2.r) - Math.max(r1.l, r2.l);
        const vert  = Math.min(r1.b, r2.b) - Math.max(r1.t, r2.t);
        return horiz > EPS && vert > EPS;
    }

    function testMove(t, axis, dist, visited) {
        if (visited.has(t.id)) return true;
        visited.add(t.id);

        const ax = allowedAxes(t);
        if (axis === 'h' && !ax.h) return false;
        if (axis === 'v' && !ax.v) return false;

        const nX = t.x + (axis === 'h' ? dist : 0);
        const nY = t.y + (axis === 'v' ? dist : 0);
        const b = getBounds(t, nX, nY);
        const lim = p.size * GRID_SIZE;

        if (b.l < -0.1 || b.r > lim + 0.1 || b.t < -0.1 || b.b > lim + 0.1) return false;

        for (const o of p.tiles) {
            if (!visited.has(o.id) && overlap(b, getBounds(o, o.x, o.y))) {
                if (!testMove(o, axis, dist, visited)) return false;
            }
        }
        return true;
    }

    function executeMove(t, axis, dist, visited) {
        if (visited.has(t.id)) return;
        visited.add(t.id);

        const b = getBounds(t,
            t.x + (axis === 'h' ? dist : 0),
            t.y + (axis === 'v' ? dist : 0)
        );

        for (const o of p.tiles) {
            if (!visited.has(o.id) && overlap(b, getBounds(o, o.x, o.y))) {
                executeMove(o, axis, dist, visited);
            }
        }

        if (axis === 'h') t.x += dist;
        else t.y += dist;
    }

    function getPointerPos(evt) {
        const rect = canvas.getBoundingClientRect();
        if (evt.touches && evt.touches.length) {
            return { x: evt.touches[0].clientX - rect.left, y: evt.touches[0].clientY - rect.top };
        }
        if (evt.changedTouches && evt.changedTouches.length) {
            return { x: evt.changedTouches[0].clientX - rect.left, y: evt.changedTouches[0].clientY - rect.top };
        }
        return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
    }

    function pointerDown(evt) {
        if (isAutoSolving) return;
        if (isSolved) return;

        const { x: mx, y: my } = getPointerPos(evt);
        const hit = p.tiles.find(t => {
            const b = getBounds(t, t.x, t.y);
            return mx > b.l && mx < b.r && my > b.t && my < b.b;
        });

        if (hit) {
            saveState();
            drag.active = hit;
            drag.lastX = mx;
            drag.lastY = my;
            drag.axis = null;
        }
    }

    function pointerMove(evt) {
        if (!drag.active) return;
        const { x: mx, y: my } = getPointerPos(evt);

        if (!drag.axis) {
            const dx = Math.abs(mx - drag.lastX);
            const dy = Math.abs(my - drag.lastY);
            if (dx <= 5 && dy <= 5) return;

            let intended = dx > dy ? 'h' : 'v';
            const ax = allowedAxes(drag.active);
            if (intended === 'h' && !ax.h && ax.v) intended = 'v';
            if (intended === 'v' && !ax.v && ax.h) intended = 'h';
            if ((intended === 'h' && !ax.h) || (intended === 'v' && !ax.v)) return;
            drag.axis = intended;
        }

        const delta = (drag.axis === 'h' ? mx - drag.lastX : my - drag.lastY);
        const steps = Math.abs(Math.round(delta));
        const dir = Math.sign(delta);

        for (let i = 0; i < steps; i++) {
            if (testMove(drag.active, drag.axis, dir, new Set())) executeMove(drag.active, drag.axis, dir, new Set());
            else break;
        }

        if (drag.axis === 'h') drag.lastX = mx;
        else drag.lastY = my;
    }

    function pointerUp() {
        if (drag.active) {
            let moved = false;
            p.tiles.forEach(t => {
                const oldR = t.r;
                const oldC = t.c;
                t.c = Math.round((t.x - (t.w * GRID_SIZE) / 2) / GRID_SIZE);
                t.r = Math.round((t.y - (t.h * GRID_SIZE) / 2) / GRID_SIZE);
                if (t.c !== oldC || t.r !== oldR) moved = true;
            });

            if (!moved) {
                moveHistory.pop();
                updateUIState();
            } else {
                checkWin();
            }
        }
        drag.active = null;
    }

    // Pointer Events preferred; mouse/touch fallback
    function onPointerDown(e) {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        e.preventDefault();
        pointerDown(e);
    }
    function onPointerMove(e) {
        e.preventDefault();
        pointerMove(e);
    }
    function onPointerUp(e) {
        if (e) e.preventDefault();
        pointerUp();
    }

    function attachInputHandlers() {
        if (window.PointerEvent) {
            canvas.style.touchAction = 'none';
            canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
            window.addEventListener('pointermove', onPointerMove, { passive: false });
            window.addEventListener('pointerup', onPointerUp, { passive: false });
            window.addEventListener('pointercancel', onPointerUp, { passive: false });
            return;
        }

        canvas.onmousedown = (e) => { if (e.button === 0) pointerDown(e); };
        canvas.ontouchstart = (e) => { e.preventDefault(); pointerDown(e); };

        window.onmousemove = pointerMove;
        window.ontouchmove = (e) => { e.preventDefault(); pointerMove(e); };

        window.onmouseup = pointerUp;
        window.ontouchend = pointerUp;
        window.ontouchcancel = pointerUp;
    }

    attachInputHandlers();

    function checkWin() {
        const { curR, curC } = computeSums();
        const win = p.targets.rows.every((val, i) => curR[i] === val) && p.targets.cols.every((val, i) => curC[i] === val);
        if (win && !isSolved) {
            isSolved = true;
            startSolveAnimation();
            updateUIState();
        }
    }

    function startSolveAnimation() {
        const now = performance.now();
        solveAnim = { phase: 'rows', index: 0, startTime: now };
    }

    function draw() {
        if (!p) { requestAnimationFrame(draw); return; }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const { curR, curC } = computeSums();

        // Update target styling
        p.targets.rows.forEach((val, i) => {
            const el = document.getElementById(`row-t-${i}`);
            if (el) el.classList.toggle('solved', curR[i] === val);
        });
        p.targets.cols.forEach((val, i) => {
            const el = document.getElementById(`col-t-${i}`);
            if (el) el.classList.toggle('solved', curC[i] === val);
        });

        // Solve celebration overlay
        if (solveAnim) {
            const now = performance.now();
            const elapsed = now - solveAnim.startTime;
            const step = SOLVE_STEP_MS;

            function drawRowHighlight(r, alpha) {
                ctx.fillStyle = `rgba(34,197,94,${alpha})`;
                ctx.fillRect(0, r * GRID_SIZE, canvas.width, GRID_SIZE);
            }
            function drawColHighlight(c, alpha) {
                ctx.fillStyle = `rgba(34,197,94,${alpha})`;
                ctx.fillRect(c * GRID_SIZE, 0, GRID_SIZE, canvas.height);
            }

            if (solveAnim.phase === 'rows') {
                const i = Math.floor(elapsed / step);
                if (i >= p.size) {
                    solveAnim.phase = 'cols';
                    solveAnim.startTime = now;
                } else {
                    drawRowHighlight(i, 0.25);
                    popTarget(`row-t-${i}`, elapsed % step);
                }
            } else if (solveAnim.phase === 'cols') {
                const i = Math.floor(elapsed / step);
                if (i >= p.size) {
                    solveAnim.phase = 'final';
                    solveAnim.startTime = now;
                } else {
                    drawColHighlight(i, 0.25);
                    popTarget(`col-t-${i}`, elapsed % step);
                }
            } else if (solveAnim.phase === 'final') {
                const a = Math.max(0, 1 - elapsed / SOLVE_FINAL_MS);
                ctx.fillStyle = `rgba(34,197,94,${0.15 * a})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (elapsed >= SOLVE_FINAL_MS) solveAnim = null;
            }
        }

        // Grid lines
        ctx.strokeStyle = '#e2e2e2';
        ctx.lineWidth = 1.5;
        for (let j = 1; j < p.size; j++) {
            ctx.beginPath(); ctx.moveTo(j * GRID_SIZE, 0); ctx.lineTo(j * GRID_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, j * GRID_SIZE); ctx.lineTo(canvas.width, j * GRID_SIZE); ctx.stroke();
        }

        // Tiles
        for (const t of p.tiles) {
            if (!drag.active && !isAutoSolving) {
                t.x += (t.c * GRID_SIZE + (t.w * GRID_SIZE) / 2 - t.x) * SNAP_SPEED;
                t.y += (t.r * GRID_SIZE + (t.h * GRID_SIZE) / 2 - t.y) * SNAP_SPEED;
            }

            ctx.fillStyle = tileColor(t.w, t.h);
            ctx.beginPath();
            ctx.roundRect(
                t.x - (t.w * GRID_SIZE - 10) / 2,
                t.y - (t.h * GRID_SIZE - 10) / 2,
                t.w * GRID_SIZE - 10,
                t.h * GRID_SIZE - 10,
                4
            );
            ctx.fill();

            // Per-cell numbers
            ctx.fillStyle = 'white';
            ctx.font = '600 22px Outfit';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const left = t.x - (t.w * GRID_SIZE) / 2;
            const top = t.y - (t.h * GRID_SIZE) / 2;
            for (let rr = 0; rr < t.h; rr++) {
                for (let cc = 0; cc < t.w; cc++) {
                    const idx = rr * t.w + cc;
                    const v = t.vals[idx];
                    if (!v) continue;
                    const cx = left + cc * GRID_SIZE + GRID_SIZE / 2;
                    const cy = top + rr * GRID_SIZE + GRID_SIZE / 2;
                    ctx.fillText(v, cx, cy);
                }
            }
        }

        requestAnimationFrame(draw);
    }

    function popTarget(id, localTime) {
        const el = document.getElementById(id);
        if (!el) return;
        const t = Math.min(1, localTime / SOLVE_STEP_MS);
        const scale = 1 + 0.35 * Math.sin(t * Math.PI);
        el.style.transform = `scale(${scale})`;
        el.style.transition = 'transform 80ms linear';
    }

    function toggleHelp(show) {
        document.getElementById('instructions-overlay').style.display = show ? 'flex' : 'none';
    }

    // UI buttons
    document.getElementById('undoBtn').onclick = () => {
        if (moveHistory.length === 0 || isSolved || isAutoSolving) return;
        const prevState = JSON.parse(moveHistory.pop());
        prevState.forEach(s => {
            const tile = p.tiles.find(t => t.id === s.id);
            if (tile) { tile.r = s.r; tile.c = s.c; }
        });
        updateUIState();
    };

    document.getElementById('resetBtn').onclick = () => {
        moveHistory = [];
        p.tiles.forEach((t, i) => {
            t.r = originalScramble[i].r;
            t.c = originalScramble[i].c;
            t.x = t.c * GRID_SIZE + (t.w * GRID_SIZE) / 2;
            t.y = t.r * GRID_SIZE + (t.h * GRID_SIZE) / 2;
        });
        isSolved = false;
        isAutoSolving = false;
        solveAnim = null;
        updateUIState();
    };

    document.getElementById('solveNextBtn').onclick = () => {
        if (currentLvlIdx < PUZZLES.length - 1) {
            currentLvlIdx++;
            loadPuzzle(currentLvlIdx);
        }
    };

    document.getElementById('prevBtn').onclick = () => {
        if (currentLvlIdx > 0) {
            currentLvlIdx--;
            loadPuzzle(currentLvlIdx);
        }
    };

    document.getElementById('nextBtn').onclick = () => {
        if (currentLvlIdx < PUZZLES.length - 1) {
            currentLvlIdx++;
            loadPuzzle(currentLvlIdx);
        }
    };

    // ----------------------------
    // Solver (optimal BFS + playback)
    // ----------------------------

    function puzzleToFixed(puz) {
        const tiles = puz.b.map((raw, i) => {
            const t = parseTile(raw, i + 1);
            return { id: t.id, w: t.w, h: t.h, vals: t.vals, r0: t.r, c0: t.c };
        });
        return { size: puz.s, targets: puz.t, tiles };
    }

    function stateKey(pos) {
        return pos.map(p => `${p.r},${p.c}`).join('|');
    }

    function computeSumsFromState(fixed, pos) {
        const curR = new Array(fixed.size).fill(0);
        const curC = new Array(fixed.size).fill(0);
        for (let i = 0; i < fixed.tiles.length; i++) {
            const t = fixed.tiles[i];
            const base = pos[i];
            for (let rr = 0; rr < t.h; rr++) {
                for (let cc = 0; cc < t.w; cc++) {
                    const v = t.vals[rr * t.w + cc];
                    if (!v) continue;
                    curR[base.r + rr] += v;
                    curC[base.c + cc] += v;
                }
            }
        }
        return { curR, curC };
    }

    function isSolvedState(fixed, pos) {
        const { curR, curC } = computeSumsFromState(fixed, pos);
        for (let i = 0; i < fixed.size; i++) {
            if (curR[i] !== fixed.targets.rows[i]) return false;
            if (curC[i] !== fixed.targets.cols[i]) return false;
        }
        return true;
    }

    function buildOccupancy(fixed, pos) {
        const occ = Array.from({ length: fixed.size }, () => new Array(fixed.size).fill(-1));
        for (let i = 0; i < fixed.tiles.length; i++) {
            const t = fixed.tiles[i];
            const base = pos[i];
            for (let rr = 0; rr < t.h; rr++) {
                for (let cc = 0; cc < t.w; cc++) {
                    occ[base.r + rr][base.c + cc] = i;
                }
            }
        }
        return occ;
    }

    function leadingEdgeCells(tile, base, axis, dir) {
        const cells = [];
        if (axis === 'h') {
            const col = base.c + (dir > 0 ? tile.w : -1);
            for (let rr = 0; rr < tile.h; rr++) cells.push([base.r + rr, col]);
        } else {
            const row = base.r + (dir > 0 ? tile.h : -1);
            for (let cc = 0; cc < tile.w; cc++) cells.push([row, base.c + cc]);
        }
        return cells;
    }

    function canPush(fixed, pos, occ, idx, axis, dir, visiting) {
        if (visiting.has(idx)) return true;
        visiting.add(idx);

        const tile = fixed.tiles[idx];
        const base = pos[idx];

        const ax = allowedAxes(tile);
        if (axis === 'h' && !ax.h) return false;
        if (axis === 'v' && !ax.v) return false;

        const nr = base.r + (axis === 'v' ? dir : 0);
        const nc = base.c + (axis === 'h' ? dir : 0);
        if (nr < 0 || nc < 0 || nr + tile.h > fixed.size || nc + tile.w > fixed.size) return false;

        const edge = leadingEdgeCells(tile, base, axis, dir);
        for (const [r, c] of edge) {
            const b = occ[r]?.[c];
            if (b === -1 || b === idx) continue;
            if (!canPush(fixed, pos, occ, b, axis, dir, visiting)) return false;
        }
        return true;
    }

    function applyMoveGrid(fixed, pos, idx, axis, dir) {
        const occ = buildOccupancy(fixed, pos);
        if (!canPush(fixed, pos, occ, idx, axis, dir, new Set())) return null;

        const newPos = pos.map(p => ({ r: p.r, c: p.c }));
        const moved = new Set();

        function push(i) {
            if (moved.has(i)) return;
            moved.add(i);

            const tile = fixed.tiles[i];
            const base = newPos[i];

            const occ2 = buildOccupancy(fixed, newPos);
            const edge = leadingEdgeCells(tile, base, axis, dir);
            for (const [r, c] of edge) {
                const b = occ2[r]?.[c];
                if (b === -1 || b === i) continue;
                push(b);
            }

            if (axis === 'h') newPos[i].c += dir;
            else newPos[i].r += dir;
        }

        push(idx);
        return newPos;
    }

    const SOLVER_MAX_NODES = 500000;

    function validatePuzzleForSolver(fixed) {
        const sumRows = fixed.targets.rows.reduce((a, b) => a + b, 0);
        const sumCols = fixed.targets.cols.reduce((a, b) => a + b, 0);
        let sumVals = 0;
        for (const t of fixed.tiles) for (const v of t.vals) if (v) sumVals += v;
        if (sumRows !== sumCols) return `Invalid puzzle: sum(rows)=${sumRows} != sum(cols)=${sumCols}`;
        if (sumRows !== sumVals) return `Invalid puzzle: sum(targets)=${sumRows} != sum(tile values)=${sumVals}`;
        return null;
    }

    function bfsSolve(puz, maxNodes = SOLVER_MAX_NODES) {
        const fixed = puzzleToFixed(puz);
        const invalid = validatePuzzleForSolver(fixed);
        if (invalid) return { minMoves: null, path: null, explored: 0, reason: invalid };

        const start = fixed.tiles.map(t => ({ r: t.r0, c: t.c0 }));
        const startKey = stateKey(start);
        if (isSolvedState(fixed, start)) return { minMoves: 0, path: [] };

        const queue = [start];
        let head = 0;
        let explored = 0;

        const parent = new Map();
        parent.set(startKey, null);

        while (head < queue.length) {
            const cur = queue[head++];
            const curKey = stateKey(cur);
            explored++;

            if (explored > maxNodes) {
                return { minMoves: null, path: null, explored, reason: `Search limit hit (${maxNodes} expanded states).` };
            }

            for (let i = 0; i < fixed.tiles.length; i++) {
                const tile = fixed.tiles[i];
                const ax = allowedAxes(tile);
                const axes = [];
                if (ax.h) axes.push('h');
                if (ax.v) axes.push('v');

                for (const axis of axes) {
                    for (const dir of [-1, 1]) {
                        const nxt = applyMoveGrid(fixed, cur, i, axis, dir);
                        if (!nxt) continue;
                        const k = stateKey(nxt);
                        if (parent.has(k)) continue;

                        parent.set(k, { prev: curKey, move: { tileIndex: i, axis, dir } });
                        if (parent.size > maxNodes) {
                            return { minMoves: null, path: null, explored, reason: `Search limit hit (${maxNodes} discovered states).` };
                        }

                        if (isSolvedState(fixed, nxt)) {
                            const path = [];
                            let walk = k;
                            while (walk !== startKey) {
                                const info = parent.get(walk);
                                path.push(info.move);
                                walk = info.prev;
                            }
                            path.reverse();
                            return { minMoves: path.length, path };
                        }

                        queue.push(nxt);
                    }
                }
            }
        }

        return { minMoves: null, path: null, explored, reason: 'Exhausted search space (no solution found).' };
    }

    function setMinMovesLabel(idx) {
        const label = document.getElementById('minMovesLabel');
        if (!label) return;
        const mm = PUZZLES[idx].minMoves;
        label.textContent = Number.isFinite(mm) ? `Best: ${mm}` : '';
    }

    (function solverTests() {
        console.assert(typeof bfsSolve === 'function', 'solver exists');
        const tA = allowedAxes({ w: 3, h: 1 });
        const tB = allowedAxes({ w: 1, h: 3 });
        console.assert(tA.h && !tA.v, 'axes 3x1');
        console.assert(!tB.h && tB.v, 'axes 1x3');

        // Ensure solver returns an integer or null
        const res0 = bfsSolve(PUZZLES[0], 50000);
        console.assert(res0.minMoves === null || Number.isInteger(res0.minMoves), 'solver returns int or null');
        console.assert(res0.path === null || Array.isArray(res0.path), 'solver path array or null');
    })();

    // Animate a BFS path using the live engine's push physics.
    // Speed: ~2x faster than the old version.
    const SOLVER_PIXELS_PER_FRAME = 2; // higher = faster
    const SOLVER_MOVE_DELAY_MS = 30;   // pause between moves

    function animateSolution(path) {
        if (!Array.isArray(path) || path.length === 0) {
            // If already solved, this keeps solved state.
            checkWin();
            return;
        }

        isAutoSolving = true;
        drag.active = null;
        updateUIState();

        let i = 0;

        function runNextMove() {
            if (i >= path.length) {
                isAutoSolving = false;

                // IMPORTANT: commit tile grid positions based on final pixel positions
                // (calling pointerUp() here was snapping tiles back to their old r/c).
                p.tiles.forEach(t => {
                    t.c = Math.round((t.x - (t.w * GRID_SIZE) / 2) / GRID_SIZE);
                    t.r = Math.round((t.y - (t.h * GRID_SIZE) / 2) / GRID_SIZE);
                });

                // Ensure solved state is detected and persists
                checkWin();
                updateUIState();
                return;
            }

            const m = path[i++];
            const tile = p.tiles[m.tileIndex];
            const pixelDist = m.dir * GRID_SIZE;
            const pxDir = Math.sign(pixelDist);
            const totalSteps = Math.abs(pixelDist);
            const framesNeeded = Math.ceil(totalSteps / SOLVER_PIXELS_PER_FRAME);

            let step = 0;

            function animatePixelStep() {
                if (step >= framesNeeded) {
                    setTimeout(runNextMove, SOLVER_MOVE_DELAY_MS);
                    return;
                }

                const movePx = pxDir * SOLVER_PIXELS_PER_FRAME;
                if (testMove(tile, m.axis, movePx, new Set())) {
                    executeMove(tile, m.axis, movePx, new Set());
                }

                step++;
                requestAnimationFrame(animatePixelStep);
            }

            animatePixelStep();
        }

        runNextMove();
    }

    document.getElementById('solverBtn').onclick = () => {
        if (isSolved || isAutoSolving) return;

        const puz = PUZZLES[currentLvlIdx];

        if (!Array.isArray(puz._path) || !Number.isFinite(puz.minMoves)) {
            const res = bfsSolve(puz);
            if (!Number.isFinite(res.minMoves)) {
                const reason = res.reason ? `\n${res.reason}` : '';
                const explored = Number.isFinite(res.explored) ? `\nExplored: ${res.explored}` : '';
                alert(`Solver could not produce a solution.${reason}${explored}`);
                return;
            }
            puz.minMoves = res.minMoves;
            puz._path = res.path;
            setMinMovesLabel(currentLvlIdx);
        }

        animateSolution(puz._path);
    };

    // Initial load
    loadPuzzle(0);
    draw();
</script>
</body>
</html>
