<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bug Scurry: Architect v5</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 0; background: #ffffff; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        #sidebar { width: 350px; min-width: 350px; background: #f8fafc; border-right: 1.5px solid #e2e8f0; padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; z-index: 10; }
        #game-view { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff; position: relative; }
        .grid-wrapper { position: relative; padding: 12px; background: #f1f5f9; border-radius: 4px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .grid-line { border: 1px solid #e2e8f0; width: 76px; height: 76px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; background: white; }
        .target-square { background-color: #ffecb3; }
        .hint-square { border: 3px solid #38bdf8 !important; }
        .bug-layer { transition: all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95); pointer-events: none; position: absolute; width: 20%; height: 20%; display: flex; align-items: center; justify-content: center; }
        .falling-bug { transform: scale(0); opacity: 0; transition: transform 0.3s ease-in, opacity 0.2s ease-in; }
        .ledger-code { font-family: monospace; font-size: 10px; background: #0f172a; color: #38bdf8; padding: 12px; border-radius: 6px; white-space: pre-wrap; margin-top: 10px; height: 140px; overflow-y: auto; border: 1px solid #334155; }
        .nav-arrow { cursor: pointer; font-size: 28px; color: #94a3b8; padding: 0 15px; user-select: none; }
        .nav-arrow:hover:not(.disabled) { color: #0f172a; transform: scale(1.1); }
        .nav-arrow.disabled { opacity: 0.2; cursor: default; }
        input[type="range"] { accent-color: #0f172a; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Bug = ({ isFalling }) => (
            <div className={isFalling ? 'falling-bug' : ''}>
                <svg width="48" height="48" viewBox="0 0 28 28">
                    <circle cx="14" cy="16" r="9" fill="#ff5f5f" />
                    <path d="M8 13 A 7 7 0 0 1 20 13" fill="#333" />
                    <g stroke="#333" strokeWidth="1.2" strokeLinecap="round">
                        <line x1="8" y1="12" x2="3" y2="10" /><line x1="7" y1="16" x2="2" y2="16" /><line x1="8" y1="20" x2="3" y2="22" />
                        <line x1="20" y1="12" x2="25" y2="10" /><line x1="21" y1="16" x2="26" y2="16" /><line x1="20" y1="20" x2="25" y2="22" />
                    </g>
                    <circle cx="11" cy="17" r="1.5" fill="white" opacity="0.9"/><circle cx="17" cy="17" r="1.5" fill="white" opacity="0.9"/>
                </svg>
            </div>
        );

        const Architect = () => {
            const [paramInitial, setParamInitial] = useState(2);
            const [paramPlacements, setParamPlacements] = useState(3);
            const [paramTouching, setParamTouching] = useState(2);
            const [batch, setBatch] = useState([]);
            const [batchIndex, setBatchIndex] = useState(-1);
            const [log, setLog] = useState("Ready");
            const [isSearching, setIsSearching] = useState(false);
            const [showHint, setShowHint] = useState(false);
            const [bugs, setBugs] = useState([]);
            const [placedCount, setPlacedCount] = useState(0);
            const [isAnimating, setIsAnimating] = useState(false);
            const [ledger, setLedger] = useState("");

            const getPos = (sq) => ({ r: Math.floor((sq - 1) / 5), c: (sq - 1) % 5 });
            const getSq = (r, c) => (r < 0 || r > 4 || c < 0 || c > 4) ? null : r * 5 + c + 1;
            const isTouching = (s1, s2) => {
                const p1 = getPos(s1), p2 = getPos(s2);
                return Math.abs(p1.r - p2.r) <= 1 && Math.abs(p1.c - p2.c) <= 1;
            };

            // --- THE FIXED PUSH LOGIC (MATCHES GAME PHYSICS) ---
            const simulateMove = (clickSq, currentBugs) => {
                const p = getPos(clickSq);
                let result = [...currentBugs];
                
                // Find all immediate neighbors
                const neighbors = result.filter(bSq => isTouching(clickSq, bSq));
                
                for (let neighborSq of neighbors) {
                    const bp = getPos(neighborSq);
                    const dr = bp.r - p.r;
                    const dc = bp.c - p.c;
                    
                    let targetToMove = neighborSq;
                    let chain = [];
                    
                    // Recursive Chain Detection
                    while (targetToMove) {
                        chain.push(targetToMove);
                        const cp = getPos(targetToMove);
                        const nextSq = getSq(cp.r + dr, cp.c + dc);
                        
                        // Check if the next square in the line is occupied by a bug NOT in our current chain
                        targetToMove = result.find(b => b === nextSq && !chain.includes(b));
                    }
                    
                    // Resolve the chain move (back to front to avoid collisions)
                    for (let i = chain.length - 1; i >= 0; i--) {
                        const bugSq = chain[i];
                        const bp_curr = getPos(bugSq);
                        const nextSq = getSq(bp_curr.r + dr, bp_curr.c + dc);
                        
                        if (nextSq === null) return null; // Placed bugs MUST NOT push off board constraint
                        
                        const idx = result.indexOf(bugSq);
                        result[idx] = nextSq;
                    }
                }
                return result;
            };

            const runGeneration = () => {
                const central = [7, 8, 9, 12, 13, 14, 17, 18, 19];
                let currentBugs = [];
                if (paramInitial > 0) {
                    currentBugs.push(central[Math.floor(Math.random() * central.length)]);
                    while (currentBugs.length < paramInitial) {
                        let candidates = central.filter(s => !currentBugs.includes(s) && currentBugs.some(b => isTouching(s, b)));
                        if (candidates.length === 0) break;
                        currentBugs.push(candidates[Math.floor(Math.random() * candidates.length)]);
                    }
                }
                const prePlaced = [...currentBugs];
                const aiMoves = [];
                for (let i = 0; i < paramPlacements; i++) {
                    let candidates = Array.from({length: 25}, (_, j) => j + 1).filter(s => !currentBugs.includes(s) && currentBugs.some(b => isTouching(s, b)));
                    if (candidates.length === 0) return null;
                    candidates.sort(() => Math.random() - 0.5);
                    let moved = false;
                    for (let move of candidates) {
                        let next = simulateMove(move, currentBugs);
                        if (next) { currentBugs = [...next, move]; aiMoves.push(move); moved = true; break; }
                    }
                    if (!moved) return null;
                }
                let touchCount = 0;
                currentBugs.forEach(b1 => { if (currentBugs.some(b2 => b1 !== b2 && isTouching(b1, b2))) touchCount++; });
                if (touchCount >= paramTouching) return { targets: [...currentBugs].sort((a,b)=>a-b), maxBugs: paramPlacements, prePlaced, solution: aiMoves };
                return null;
            };

            const generateBatch = () => {
                setIsSearching(true); setLog("Scanning possibilities..."); setShowHint(false);
                const start = Date.now(); let found = [];
                setTimeout(() => {
                    while (found.length < 25 && (Date.now() - start) < 6000) {
                        let p = runGeneration(); if (p) found.push(p);
                    }
                    setBatch(found); setBatchIndex(found.length > 0 ? 0 : -1);
                    setLog(found.length > 0 ? `Batch loaded (${found.length})` : "Try reducing difficulty.");
                    setIsSearching(false);
                }, 100);
            };

            useEffect(() => { if (batchIndex >= 0) resetPlaytest(); }, [batchIndex]);

            const resetPlaytest = () => {
                const p = batch[batchIndex];
                setBugs(p.prePlaced.map((sq, i) => ({ id: `pre-${i}`, square: sq, isFalling: false })));
                setPlacedCount(0); setIsAnimating(false);
            };

            const placeBug = (square) => {
                if (isAnimating || placedCount >= batch[batchIndex].maxBugs || bugs.some(b => b.square === square)) return;
                setIsAnimating(true);
                const p = getPos(square);
                
                // Reuse the same logic for the test bench to ensure consistency
                const currentBugSquares = bugs.map(b => b.square);
                const nextStateSquares = simulateMove(square, currentBugSquares);
                
                if (nextStateSquares === null) {
                    // In playtest, we let things fall off, but generate logic forbids it.
                    // For the sake of the architect, we'll implement the actual game's push logic here:
                    handlePlaytestScurry(square);
                    return;
                }

                setBugs(prev => {
                    const moved = prev.map((bug, i) => ({ ...bug, square: nextStateSquares[i] }));
                    return [...moved, { id: Date.now(), square, isFalling: false }];
                });

                setPlacedCount(prev => prev + 1);
                setTimeout(() => setIsAnimating(false), 500);
            };

            // This is the "Full Game Logic" for the playtester, allowing bugs to fall off.
            const handlePlaytestScurry = (clickSq) => {
                const p = getPos(clickSq);
                setBugs(prev => {
                    let currentBugs = [...prev];
                    const neighbors = currentBugs.filter(b => isTouching(clickSq, b.square));
                    
                    neighbors.forEach(neighbor => {
                        const bp = getPos(neighbor.square);
                        const dr = bp.r - p.r; const dc = bp.c - p.c;
                        let target = neighbor;
                        let chain = [];
                        while (target) {
                            chain.push(target);
                            const cp = getPos(target.square);
                            const ns = getSq(cp.r + dr, cp.c + dc);
                            target = currentBugs.find(b => b.square === ns && !chain.includes(b));
                        }
                        chain.reverse().forEach(b => {
                            const cp = getPos(b.square);
                            const ns = getSq(cp.r + dr, cp.c + dc);
                            b.square = ns || -100;
                            b.isFalling = !ns;
                        });
                    });
                    return [...currentBugs, { id: Date.now(), square: clickSq, isFalling: false }];
                });
                setPlacedCount(prev => prev + 1);
                setTimeout(() => { setBugs(prev => prev.filter(b => !b.isFalling)); setIsAnimating(false); }, 500);
            };

            const copyToLedger = () => {
                const p = batch[batchIndex];
                const line = `{ targets: [${p.targets.join(', ')}], maxBugs: ${p.maxBugs}, prePlaced: [${p.prePlaced.join(', ')}] },\n`;
                setLedger(prev => prev + line);
            };

            return (
                <div style={{ display: 'flex', width: '100vw', height: '100vh' }}>
                    <div id="sidebar">
                        <h1 className="text-xl font-bold border-b pb-4">Bug Architect v5</h1>
                        <div className="space-y-6">
                            <div><label className="text-[10px] font-bold uppercase text-slate-500">Initial Cluster: {paramInitial}</label>
                            <input type="range" min="0" max="4" value={paramInitial} onChange={e => setParamInitial(Number(e.target.value))} /></div>
                            <div><label className="text-[10px] font-bold uppercase text-slate-500">AI Moves: {paramPlacements}</label>
                            <input type="range" min="1" max="8" value={paramPlacements} onChange={e => setParamPlacements(Number(e.target.value))} /></div>
                            <div><label className="text-[10px] font-bold uppercase text-slate-500">Complexity (Touching): {paramTouching}</label>
                            <input type="range" min="2" max="10" value={paramTouching} onChange={e => setParamTouching(Number(e.target.value))} /></div>
                        </div>
                        <button onClick={generateBatch} disabled={isSearching} className="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-xs uppercase hover:bg-black">Generate Batch</button>
                        <p className="text-xs text-slate-400 text-center italic">{log}</p>
                        {batchIndex >= 0 && (
                            <div className="space-y-4 pt-4 border-t">
                                <div className="flex justify-between items-center"><span className="text-xs font-bold">Puzzle {batchIndex + 1}/{batch.length}</span>
                                <div className="flex"><div className={`nav-arrow ${batchIndex === 0 ? 'disabled' : ''}`} onClick={() => setBatchIndex(Math.max(0, batchIndex-1))}>←</div>
                                <div className={`nav-arrow ${batchIndex === batch.length-1 ? 'disabled' : ''}`} onClick={() => setBatchIndex(Math.min(batch.length-1, batchIndex+1))}>→</div></div></div>
                                <button onClick={() => setShowHint(!showHint)} className="w-full py-2 bg-sky-50 border border-sky-200 text-sky-600 rounded text-[10px] font-bold uppercase">{showHint ? "Hide Solution" : "Show AI Moves"}</button>
                                <div className="flex gap-2"><button onClick={resetPlaytest} className="flex-1 bg-white border border-slate-300 py-2 rounded text-[10px] font-bold uppercase">Reset</button>
                                <button onClick={copyToLedger} className="flex-1 bg-green-600 text-white py-2 rounded text-[10px] font-bold uppercase">Copy</button></div>
                            </div>
                        )}
                        <div className="mt-auto"><label className="text-[10px] font-bold uppercase text-slate-500">Ledger</label>
                        <div className="ledger-code">{ledger || "// Solved puzzles..."}</div></div>
                    </div>
                    <div id="game-view">
                        {batchIndex >= 0 && (
                            <div className="flex flex-col items-center">
                                <div className="mb-10 text-center"><p className="text-[10px] uppercase text-slate-400 font-bold mb-2">Remaining Moves</p>
                                <span className="text-5xl font-light text-slate-800">{batch[batchIndex].maxBugs - placedCount}</span></div>
                                <div className="grid-wrapper">
                                    <div className="grid grid-cols-5 border-[1.5px] border-slate-300">
                                        {Array.from({length: 25}, (_, i) => i + 1).map(sq => (
                                            <div key={sq} onClick={() => placeBug(sq)}
                                                className={`grid-line cursor-pointer ${batch[batchIndex].targets.includes(sq) ? 'target-square' : ''} ${showHint && batch[batchIndex].solution.includes(sq) ? 'hint-square' : ''}`} 
                                            />
                                        ))}
                                    </div>
                                    {bugs.map(b => (
                                        <div key={b.id} className="bug-layer" style={{ left: `${getPos(b.square).c * 20}%`, top: `${getPos(b.square).r * 20}%` }}><Bug isFalling={b.isFalling} /></div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.render(<Architect />, document.getElementById('root'));
    </script>
</body>
</html>
