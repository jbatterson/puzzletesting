        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #000; overflow-x: hidden; padding-top: 20px; }

        .header-row { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; margin-bottom: 1.5rem; }
        .title { letter-spacing: 0.15em; color: #000; font-weight: 900; text-transform: uppercase; font-size: 2.25rem; margin: 0; }
        
        #help-toggle { position: absolute; right: 0; width: 32px; height: 32px; border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; font-weight: 900; font-size: 18px; transition: all 0.2s; }
        #help-toggle:hover { background: #000; color: #fff; }

        .grid-line { border: 1px solid #000; }
        .target-square { background-color: #FFD600; transition: background-color 0.3s ease; }
        #canvas-wrapper { position: relative; background: white; box-shadow: 0 0 0 2px #000; border-radius: 2px; margin: 0 auto; }

        .stats-container { display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        @media (max-height: 820px) {
            body { padding-top: 10px; }
            .header-row { margin-bottom: 0.5rem; }
            .stats-container { margin-bottom: 0.75rem; flex-direction: row !important; justify-content: space-between; }
            .title { font-size: 1.75rem; }
            #canvas-wrapper { transform: scale(0.9); transform-origin: top; margin-bottom: -20px; }
            .mt-8 { margin-top: 1rem !important; }
        }

        /* More aggressive scaling for very short screens (e.g., landscape phones) */
        @media (max-height: 680px) {
            #canvas-wrapper { transform: scale(0.75); margin-bottom: -60px; }
            .title { font-size: 1.5rem; }
            #help-toggle { width: 28px; height: 28px; font-size: 14px; }
            .btn-action { padding: 0.75rem 0; }
        }

        .nav-arrow { cursor: pointer; color: #000; transition: all 0.2s; font-size: 28px; line-height: 1; padding: 0 15px; font-weight: 600; }
        .nav-arrow:hover:not(.disabled) { transform: scale(1.3); }
        .nav-arrow.disabled { color: #d1d5db; cursor: default; }

        .btn-action { border: 2px solid #000; font-weight: 600; letter-spacing: 0.05em; transition: all 0.1s; padding: 1rem 0; }
        .btn-action:hover:not(:disabled) { background: #000; color: #fff; }
        .btn-action:disabled { opacity: 0.2; cursor: not-allowed; border-color: #ccc; }

        @keyframes wiggle { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
        .moving-bug { animation: wiggle 0.1s infinite linear; }
        .bug-layer { transition: all 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95); pointer-events: none; }
        .falling-bug { transform: scale(0); opacity: 0; transition: transform 0.3s ease-in 0.1s, opacity 0.2s ease-in 0.1s; }

        #instructions-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column; align-items: center; z-index: 100; backdrop-filter: blur(8px); padding: 40px 20px; overflow-y: auto; }

</head>

                    const bp = getPos(b.square);
                    return Math.abs(bp.row - cp.row) <= 1 && Math.abs(bp.col - cp.col) <= 1;
                });

                    const dr = np.row - cp.row;
                    const dc = np.col - cp.col;

                    let target = neighbor;
                    while (target) {
                        chain.push(target);
                        const tp = getPos(target.square);
                        const nextSq = getSq(tp.row + dr, tp.col + dc);
                        target = workingBugs.find(b => b.square === nextSq && !chain.includes(b));
                    }

                        const nc = bp.col + dc;
                        const nextSq = getSq(nr, nc);
                        b.square = nextSq || -100;
                        b.virtualPos = { row: nr, col: nc };
                        b.isFalling = !nextSq;
                        b.isMoving = true;
                    });
                });

                setIsAnimating(true);
                
                const scurriedBugs = resolveScurry(square, bugs);
                const newBug = { id: Date.now(), square, isMoving: false, isFalling: false, virtualPos: null };
                
                const updatedBugs = [...scurriedBugs, newBug];
                setBugs(updatedBugs);
                setBugsPlacedCount(prev => prev + 1);

                    const finalBugs = updatedBugs.filter(b => !b.isFalling).map(b => ({ ...b, isMoving: false, virtualPos: null }));

                    setIsAnimating(false);

                            setTimeout(() => setIsCelebrating(false), 800); // Wiggle duration

            };

            const changeLevel = (delta) => {
                if (isAnimating) return;
                const next = currentPuzzle + delta;
                if (isTutorial) { if (next >= 0 && next <= 9) setCurrentPuzzle(next); } 
                else { if (next >= 10 && next < puzzles.length) setCurrentPuzzle(next); }
            };

            const allTargetsFilled = level.targets.length > 0 && level.targets.every(t => bugs.some(b => b.square === t));

            return (
                <div className="flex flex-col items-center game-container">
                    <div className="header-row">
                        <h1 className="title">Scurry</h1>
                        <div id="help-toggle" onClick={() => setShowInstructions(true)}>?</div>
                    </div>
                    
                    <div className="stats-container w-full">
                        <div className="flex items-center justify-between w-full max-w-[220px] py-2 border-y-2 border-black">
                            <div className={`nav-arrow ${(isTutorial ? currentPuzzle === 0 : currentPuzzle === 10) ? 'disabled' : ''}`} onClick={() => changeLevel(-1)}>←</div>
                            <div className="text-center">
                                <div className="text-[10px] uppercase tracking-[0.2em] font-black">{isTutorial ? 'Tutorial' : 'Puzzle'}</div>
                                <div className="text-xl font-black leading-tight">{isSandbox ? '∞' : (isTutorial ? currentPuzzle + 1 : currentPuzzle - 9)}</div>
                            </div>
                            <div className={`nav-arrow ${(isTutorial ? currentPuzzle === 9 : currentPuzzle === puzzles.length - 1) ? 'disabled' : ''}`} onClick={() => changeLevel(1)}>→</div>
                        </div>
                        
                        <div className="text-center px-4 py-1">
                            <div className="text-[10px] uppercase tracking-widest font-black">Bugs Available</div>
                            <div className="text-2xl font-black leading-tight">{isSandbox ? '∞' : level.maxBugs - bugsPlacedCount}</div>
                        </div>
                    </div>

                    <div id="canvas-wrapper">
                        <div className="grid grid-cols-5">
                            {Array.from({ length: 25 }, (_, i) => i + 1).map(sq => (
                                <div key={sq} onClick={() => placeBug(sq)} className={`w-16 h-16 sm:w-20 sm:h-20 grid-line flex items-center justify-center cursor-pointer ${level.targets.includes(sq) ? 'target-square' : ''}`} />
                            ))}
                        </div>
                        {bugs.map(bug => {
                            const pos = bug.virtualPos || getPos(bug.square);
                            return (
                                <div key={bug.id} className="bug-layer absolute" style={{ width: '20%', height: '20%', left: `${pos.col * 20}%`, top: `${pos.row * 20}%`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    <Bug isMoving={bug.isMoving || isCelebrating} isFalling={bug.isFalling} />
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-8 flex flex-col gap-4 w-full px-4 mb-10">
                        <div className="flex gap-4">
                            <button onClick={undo} disabled={history.length === 0 || allTargetsFilled} className="btn-action flex-1 text-xs uppercase">Undo</button>
                            <button onClick={resetLevel} className="btn-action flex-1 text-xs uppercase">Reset</button>
                        </div>
                        {allTargetsFilled && !isSandbox && ( 
                            <button onClick={() => changeLevel(1)} className="w-full bg-black text-white py-5 rounded-sm text-sm font-black uppercase tracking-widest shadow-xl mt-2">Next Level</button> 
                        )}
                    </div>

                    {showInstructions && (
                        <div id="instructions-overlay">
                            <div className="instr-content">
                                <div className="absolute -top-4 -right-4 text-3xl cursor-pointer font-light" onClick={() => setShowInstructions(false)}>✕</div>
                                <h2 className="text-3xl font-black tracking-tight uppercase text-center mb-8">How to Play</h2>
                                <p className="text-md leading-snug mb-8">Place bugs in the grid to fill every <span className="bg-[#FFD600] px-1 font-bold">yellow square</span> with a bug.</p>
                                <div className="instr-section">
                                    <p className="font-black uppercase text-xs tracking-widest mb-2">Scurrying</p>
                                    <p className="text-sm leading-relaxed text-gray-700">Placing a bug makes all of its neighbors slide one square away.</p>
                                    <div className="flex justify-center my-6">
                                        <div className="relative p-8 bg-gray-50 rounded-lg border-2 border-black">
                                            <Bug size={56} isMoving={false} />
                                            <div className="absolute inset-0 pointer-events-none">
                                                {[0, 45, 90, 135, 180, 225, 270, 315].map(deg => (
                                                    <div key={deg} style={{ position: 'absolute', top: '50%', left: '50%', transform: `translate(-50%, -50%) rotate(${deg}deg) translateY(-42px)`, fontSize: '22px', color: '#FF3B30', fontWeight: 'bold' }}>↑</div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => { setIsTutorial(false); setCurrentPuzzle(10); setShowInstructions(false); }} className="w-full bg-black text-white py-5 rounded-sm text-xs font-black uppercase tracking-widest">Play</button>
                                    <button onClick={() => { setIsTutorial(true); setCurrentPuzzle(0); setShowInstructions(false); }} className="w-full border-2 border-black py-5 rounded-sm text-xs font-black uppercase tracking-widest">Tutorial Puzzles</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.render(<BugPuzzle />, document.getElementById('root'));
    </script>
</body>
</html>
