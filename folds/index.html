    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; color: #333; overflow-x: hidden; margin: 0; padding-top: 20px; }
        .game-container { max-width: 550px; margin: 0 auto; position: relative; padding: 0 15px; }
        .title { letter-spacing: 0.25em; color: #444; font-weight: 300; text-transform: uppercase; }
        
        .fold-hit { stroke: transparent; stroke-width: 22px; pointer-events: stroke; }
        .fold-visual { stroke: #cbd5e1; stroke-width: 1.5px; transition: stroke 0.2s ease, stroke-width 0.2s ease; pointer-events: none; }
        .fold-group:hover .fold-visual { stroke-width: 4px; }

        /* Victory Pulse - Stops after 3 pulses */
        .pulse-win { animation: pulse-animation 1.5s ease-in-out 3; }
        @keyframes pulse-animation {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.2); transform: scale(1.03); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .nav-arrow { cursor: pointer; color: #94a3b8; transition: all 0.2s; font-size: 24px; line-height: 1; padding: 0 10px; }
        .nav-arrow:hover:not(.disabled) { color: #333; transform: scale(1.2); }
        .nav-arrow.disabled { color: #e2e8f0; cursor: default; }
        
        #help-toggle { position: absolute; right: 20px; top: 0; width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #999; font-weight: 600; font-size: 16px; transition: all 0.2s; z-index: 10; }
        #help-toggle:hover { border-color: #333; color: #333; }

        /* Scurry-style Overlay */
        #instructions-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.98); display: flex; flex-direction: column; align-items: center; z-index: 100; backdrop-filter: blur(8px); padding: 40px 20px; overflow-y: auto; }
        .instr-content { max-width: 400px; width: 100%; text-align: left; position: relative; }
        .close-x { position: absolute; top: -20px; right: -20px; font-size: 24px; cursor: pointer; color: #999; font-weight: 300; padding: 10px; }
        .close-x:hover { color: #333; }
        
        .btn-action { transition: all 0.2s; border-radius: 2px; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-next { background-color: #1e293b; color: white; width: 100%; padding: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0px; transition: background-color 0.2s; border-radius: 2px; }
        .btn-next:hover { background-color: #0f172a; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: white;
            padding: 14px 16px;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            z-index: 200;
            max-width: 420px;
            width: calc(100% - 32px);
        }

        /* Adaptive Board Sizing */
        .board-wrapper { width: 100%; aspect-ratio: 1 / 1; max-height: 60vh; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: 100%; max-width: 100%; touch-action: manipulation; }

        return [V0, V1, V2, V3, V4, V5];
    })();

    const HEX_BOUNDS = (() => {
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        HEX_POLY.forEach(p => {
            minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
            minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
        });
        return { minX, minY, width: maxX - minX, height: maxY - minY };
    })();

    const VB_PAD = 33;
    const HEX_VIEWBOX = { x: HEX_BOUNDS.minX - VB_PAD, y: HEX_BOUNDS.minY - VB_PAD, w: HEX_BOUNDS.width + 2 * VB_PAD, h: HEX_BOUNDS.height + 2 * VB_PAD };

    const isInsideHex = (r, c) => {
        const p = cent(r, c); let inside = false;
        for (let i = 0, j = HEX_POLY.length - 1; i < HEX_POLY.length; j = i++) {
            const xi = HEX_POLY[i].x, yi = HEX_POLY[i].y, xj = HEX_POLY[j].x, yj = HEX_POLY[j].y;
            if (((yi > p.y) !== (yj > p.y)) && (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 1e-12) + xi)) inside = !inside;
        }
        return inside;
    };

    const snap = (px, py) => {
        const re = Math.round((py - PAD) / H), ce = Math.round(2 * (px - PAD) / S) - 1;

        for (let r = Math.max(0, re - 2); r <= Math.min(10, re + 2); r++)

                const p = cent(r, c), d = (p.x - px) ** 2 + (p.y - py) ** 2;

            }
        return [br, bc];

            const tn = ((theta % Math.PI) + Math.PI) % Math.PI, a = -Math.sin(tn), b = Math.cos(tn), c = a * px + b * py;
            const key = `${Math.round(tn * 1000)}_${Math.round(c * 100)}`;
            if (seen[key]) return;
            const hits = [];
            for (let i = 0; i < HEX_POLY.length; i++) {
                const p1 = HEX_POLY[i], p2 = HEX_POLY[(i + 1) % HEX_POLY.length], dx = p2.x - p1.x, dy = p2.y - p1.y, denom = a * dx + b * dy;
                if (Math.abs(denom) < 1e-9) continue;
                const t = (c - (a * p1.x + b * p1.y)) / denom;
                if (t >= -0.01 && t <= 1.01) hits.push({ x: p1.x + t * dx, y: p1.y + t * dy });
            }
            if (hits.length >= 2) {
                let dMax = -1, pA = hits[0], pB = hits[1];
                for (let i = 0; i < hits.length; i++) for (let j = i + 1; j < hits.length; j++) {
                    const d = (hits[i].x - hits[j].x) ** 2 + (hits[i].y - hits[j].y) ** 2;
                    if (d > dMax) { dMax = d; pA = hits[i]; pB = hits[j]; }
                }
                seen[key] = true;
                lines.push({ lineKey: key, theta: tn, px, py, x1: pA.x, y1: pA.y, x2: pB.x, y2: pB.y });
            }
        };

            if (up(r, c)) { addLine(Math.atan2(H, -S/2), x+S/2, y); addLine(Math.atan2(H, S/2), x+S/2, y); addLine(0, x, y+H); }
            else { addLine(0, x, y); addLine(Math.atan2(H, -S/2), x, y); addLine(Math.atan2(H, S/2), x+S, y); }
        }
        return lines;

            const c2 = Math.cos(2 * line.theta);
            const s2 = Math.sin(2 * line.theta);

            for (const [key, color] of Object.entries(board)) {
                const [r, c] = key.split(',').map(Number);
                const cp = cent(r, c);
                const nx = line.px + (cp.x - line.px) * c2 + (cp.y - line.py) * s2;
                const ny = line.py + (cp.x - line.px) * s2 - (cp.y - line.py) * c2;

                const [nr, nc] = snap(nx, ny);
                const sp = cent(nr, nc);
                const dist2 = (sp.x - nx) ** 2 + (sp.y - ny) ** 2;

                // Snap authority rule
                if (!isInsideHex(nr, nc) || dist2 > SNAP_TOL) {
                    return { ok: false, reason: 'offboard' };

                const dist2 = (sp.x - nx) ** 2 + (sp.y - ny) ** 2;

                <div className="board-wrapper">
                    <svg viewBox={`${HEX_VIEWBOX.x} ${HEX_VIEWBOX.y} ${HEX_VIEWBOX.w} ${HEX_VIEWBOX.h}`} preserveAspectRatio="xMidYMid meet">
                        <g transform={`rotate(30 ${(HEX_BOUNDS.minX + HEX_BOUNDS.width/2)} ${(HEX_BOUNDS.minY + HEX_BOUNDS.height/2)})`}>
                            {ALL_TRIANGLES.map(t => <polygon key={t.key} points={pts(t.r, t.c)} fill="none" stroke="#f1f5f9" strokeWidth="1.5" />)}
                            {Object.entries(puzzle.target).map(([k, col]) => {
                                const [r, c] = k.split(',').map(Number);
                                return <polygon key={`t-${k}`} points={pts(r, c)} fill={col} opacity="0.1" stroke={col} strokeWidth="2" />;
                            })}
                            {Object.entries(board).map(([k, col]) => {
                                const [r, c] = k.split(',').map(Number);
                                return <polygon key={`b-${k}`} points={pts(r, c)} fill={col} className={isWon ? 'pulse-win' : ''} style={{ transformOrigin: `${cent(r,c).x}px ${cent(r,c).y}px` }} />;
                            })}
                            {anim && (
                                <g transform={`matrix(${1 + easeIO(anim.rawT) * (Math.cos(2 * anim.line.theta) - 1)} ${easeIO(anim.rawT) * Math.sin(2 * anim.line.theta)} ${easeIO(anim.rawT) * Math.sin(2 * anim.line.theta)} ${1 - easeIO(anim.rawT) * (1 + Math.cos(2 * anim.line.theta))} ${easeIO(anim.rawT) * (anim.line.px * (1 - Math.cos(2 * anim.line.theta)) - anim.line.py * Math.sin(2 * anim.line.theta))} ${easeIO(anim.rawT) * (anim.line.py * (1 + Math.cos(2 * anim.line.theta)) - anim.line.px * Math.sin(2 * anim.line.theta))})`}>
                                    {Object.entries(anim.startBoard).map(([key, col]) => {
                                        const [r, c] = key.split(',').map(Number);
                                        return <polygon key={`a-${key}`} points={pts(r, c)} fill={col} opacity={0.5} />;
                                    })}
                                </g>
                            )}
                            {ALL_LINES.map(l => (
                                <g
                                    key={l.lineKey}
                                    className="fold-group"
                                    onPointerEnter={() => setHoverLine(l.lineKey)}
                                    onPointerLeave={() => setHoverLine(h => (h === l.lineKey ? null : h))}
                                    onPointerDown={(e) => {
                                        e.preventDefault();
                                        setTapFlash(l.lineKey);
                                        setTimeout(() => setTapFlash(null), 120);
                                        handleFold(l.lineKey);
                                    }}
                                >
                                    <line x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} className="fold-hit" />
                                    <line
                                        x1={l.x1}
                                        y1={l.y1}
                                        x2={l.x2}
                                        y2={l.y2}
                                        className="fold-visual"
                                        style={{ stroke: getLineStroke(l.lineKey) }}
                                    />
                                </g>
                            ))}
                        </g>
                    </svg>
                </div>

                {/* Toast */}
                {toast && (
                    <div className="toast">
                        <div className="flex justify-between items-start gap-3">
                            <div className="text-sm leading-snug">
                                {toast === 'offboard'
                                    ? 'Reflections that place a triangle off the board are not allowed.'
                                    : 'Reflections that place a triangle of one color onto a triangle of a different color are not allowed.'}
                            </div>
                            <button onClick={() => setToast(null)} className="text-white/70 hover:text-white">✕</button>
                        </div>
                        <label className="flex items-center gap-2 mt-3 text-xs text-white/80">
                            <input
                                type="checkbox"
                                onChange={(e) => {
                                    if (e.target.checked) {
                                        const key = toast === 'offboard'
                                            ? 'folds_hide_offboard_toast'
                                            : 'folds_hide_color_toast';
                                        localStorage.setItem(key, '1');
                                    }
                                }}
                            />
                            Do not show again.
                        </label>
                    </div>
                )}

                <div className="mt-4 flex flex-col gap-3 w-full mb-6">
                    {isTutorial && levelIdx === 4 && isWon ? (
                        <div className="flex gap-4">
                            <button onClick={() => { setIsTutorial(true); setLevelIdx(0); }} className="flex-1 bg-white border border-gray-300 text-gray-900 py-3 rounded-sm text-xs font-semibold hover:bg-gray-50 uppercase tracking-widest transition-all">Restart Tutorial</button>
                            <button onClick={() => { setIsTutorial(false); setLevelIdx(5); }} className="flex-1 bg-gray-900 text-white py-3 rounded-sm text-xs font-semibold hover:bg-black uppercase tracking-widest transition-all shadow-lg">Play Puzzles</button>
                        </div>
                    ) : (
                        <>
                            <div className="flex gap-4">
                                <button
                                    onClick={() => {
                                        if (history.length <= 1) return;
                                        const prev = history.slice(0, -1);
                                        setBoard(prev[prev.length - 1]);
                                        setHistory(prev);
                                        setFolds(f => f + 1);
                                    }}
                                    disabled={history.length <= 1 || !!anim}
                                    className="btn-action flex-1 border border-gray-300 py-3 text-xs font-semibold text-gray-500 hover:bg-gray-50 uppercase tracking-widest"
                                >Undo</button>
                                <button
                                    onClick={() => {
                                        setBoard(puzzle.start);
                                        setHistory([puzzle.start]);
                                        setFolds(puzzle.folds);
                                    }}
                                    disabled={!!anim}
                                    className="btn-action flex-1 border border-gray-300 py-3 text-xs font-semibold text-gray-500 hover:bg-gray-50 uppercase tracking-widest"
                                >Reset</button>
                            </div>

                            {isWon && (
                                <button
                                    onClick={() => setLevelIdx(levelIdx + 1)}
                                    disabled={levelIdx >= LEVELS.length - 1}
                                    className="btn-next disabled:opacity-40 disabled:cursor-not-allowed"
                                >Next Level</button>
                            )}

                            {isTutorial && (
                                <button
                                    onClick={() => { setIsTutorial(false); setLevelIdx(5); }}
                                    className="w-full border border-gray-300 py-3 rounded-sm text-xs font-semibold text-gray-400 hover:bg-gray-50 uppercase tracking-widest transition-all"
                                >Skip Tutorial</button>
                            )}
                        </>
                    )}
                </div>

                {showInstructions && (
                    <div id="instructions-overlay">
                        <div className="instr-content">
                            <div className="close-x" onClick={() => setShowInstructions(false)}>✕</div>
                            <h2 className="text-2xl font-light tracking-widest uppercase text-center mb-8 text-gray-800">How to Play</h2>
                            <p className="text-sm leading-relaxed text-gray-600 mb-8">Fold the shapes along the grid lines to match the <strong>target pattern</strong>. Complete the pattern within the limited number of folds to solve the puzzle.</p>
                            <div className="mb-8">
                                <span className="text-[12px] font-bold uppercase tracking-widest text-gray-900 block mb-2">Folding</span>
                                <p className="text-sm leading-relaxed text-gray-600">Click any grid line to fold the current colored pieces over that axis. Reflections that place a triangle off the board or onto a triangle of a different color are not allowed.</p>
                            </div>
                            <div className="flex flex-col gap-3">
                                <button onClick={() => { setIsTutorial(false); setLevelIdx(5); setShowInstructions(false); }} className="w-full bg-gray-900 text-white py-4 rounded-sm text-xs font-semibold hover:bg-black uppercase tracking-widest transition-all shadow-lg">Play Game</button>
                                <button onClick={() => { setIsTutorial(true); setLevelIdx(0); setShowInstructions(false); }} className="w-full border border-gray-900 text-gray-900 py-4 rounded-sm text-xs font-semibold hover:bg-gray-50 uppercase tracking-widest transition-all">Play Tutorial</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
